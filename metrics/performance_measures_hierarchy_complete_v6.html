<!doctype html><html><head><meta charset="utf-8"><title>Performance Measures Hierarchy Vertical</title>
<script>window.MathJax={tex:{inlineMath:[['\\(','\\)'],['$','$']]}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>body{font-family:Arial;margin:0;background:#f6f7fb;color:#222}header{background:#1f2937;color:white;padding:18px 24px}main{display:grid;grid-template-columns:400px 1fr;gap:16px;padding:16px}.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 1px 6px #0002}.tree{max-height:calc(100vh - 120px);overflow:auto}details{margin:5px 0 5px 10px;border-left:2px solid #cbd5e1;padding-left:8px}summary{cursor:pointer;list-style:none}summary::-webkit-details-marker{display:none}.node{display:block;width:100%;text-align:left;border:1px solid #94a3b8;border-radius:8px;padding:7px 9px;background:#e0f2fe;cursor:pointer;margin:4px 0}.node.leaf{background:#ecfccb;margin-left:12px;width:calc(100% - 12px)}.node.active{outline:3px solid #6366f1}.section{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:11px;margin:10px 0}.section h3{margin:0 0 6px}.small{font-size:13px;color:#555;line-height:1.45}.cm{border-collapse:collapse;width:100%}.cm td,.cm th{border:1px solid #bbb;padding:8px;text-align:center}.cm th{background:#eef2f7}.num{background:#bfdbfe}.den{outline:4px solid #f59e0b;outline-offset:-4px}.both{background:#c4b5fd;outline:4px solid #f59e0b;outline-offset:-4px}@media(max-width:900px){main{grid-template-columns:1fr}.tree{max-height:none}}</style></head>
<body><header><h2 style="margin:0">Interactive Hierarchy of Performance Measures — Vertical</h2><div class="small" style="color:#d1d5db">Compact, expandable, and fully visible without a very wide tree.</div></header>
<main><section class="card tree"><div id="tree"></div></section><section class="card"><div id="info"></div></section></main>
<script>
const SUPP={"F1 / F-beta": "<div class=\"section\"><h3>Why harmonic mean?</h3>The arithmetic mean can hide one disastrous component. For precision 1 and recall 0.1, arithmetic mean is 0.55, geometric mean about 0.316, but harmonic mean only about 0.182. F1 deliberately stays close to the weaker component.</div>", "G-mean": "<div class=\"section\"><h3>Why geometric mean?</h3>It treats the two class recalls symmetrically and becomes zero if either is zero. Compared with balanced accuracy, it penalizes uneven class performance more strongly.</div>", "Dice": "<div class=\"section\"><h3>From set overlap to F1</h3>Let A be predicted positives and B true positives. Then |A∩B|=TP, |A|=TP+FP and |B|=TP+FN. Substitution gives 2TP/(2TP+FP+FN), exactly binary F1.</div>", "WRAcc": "<div class=\"section\"><h3>Intuition and geometry</h3>WRAcc rewards subgroups whose positive rate exceeds the population rate, but also rewards coverage. In ROC form it is a positive scaling of TPR−FPR, so equal-WRAcc lines are parallel to the random diagonal.</div>"};
const DATA={"nodes": {"All measures": {"type": "GROUP", "summary": "Choose the metric family according to the kind of prediction you have and the question you want answered.", "why": "The hierarchy separates hard-label correctness, score/ranking behaviour, probability quality, agreement, and broader multi-criteria evaluation.", "children": ["Confusion Matrix", "Additional Information", "Alternate Information"]}, "Confusion Matrix": {"type": "GROUP", "summary": "Metrics computed from TP, FP, FN and TN after a decision threshold has produced hard labels.", "why": "Best when the deployed decision is what matters. They do not evaluate the whole score ranking or probability calibration.", "children": ["Deterministic Classifiers"]}, "Deterministic Classifiers": {"type": "GROUP", "summary": "A classifier that already outputs labels, or a scoring model evaluated at one fixed threshold.", "why": "Every metric here describes one operating point. Changing the threshold can produce a different confusion matrix and different metric values.", "children": ["Multi-class Focus", "Single-Class Focus"]}, "Multi-class Focus": {"type": "GROUP", "summary": "Global measures aggregating over all classes or all decisions.", "why": "They are simple summaries, but may hide a weak minority class or subgroup.", "children": ["No Chance Correction", "Chance Correction"]}, "No Chance Correction": {"type": "GROUP", "summary": "Raw correctness or disagreement without correcting for expected chance agreement.", "children": ["Accuracy", "Error Rate"]}, "Chance Correction": {"type": "GROUP", "summary": "Agreement measures that subtract agreement expected from marginal label frequencies.", "children": ["Cohen's Kappa", "Fleiss' Kappa"]}, "Single-Class Focus": {"type": "GROUP", "summary": "Metrics centred on one designated positive class. In multiclass problems they are normally computed one-vs-rest and then macro-, weighted-, or micro-averaged.", "children": ["Precision / PPV", "Recall / Sensitivity / TPR", "Specificity / TNR", "Fallout / FPR", "F1 / F-beta", "G-mean", "Dice", "Balanced Accuracy", "WRAcc", "Fowlkes–Mallows", "Likelihood Ratios"], "why": "These metrics answer different conditional questions because their denominators condition on different sets: true positives, true negatives, or predicted positives."}, "Additional Information": {"type": "GROUP", "summary": "Measures requiring scores, probabilities, costs, uncertainty, or class-skew information beyond one hard confusion matrix.", "why": "Use these when ranking, threshold choice, probability reliability, or application costs matter.", "children": ["Scoring Classifiers", "Continuous / Probabilistic Classifiers"]}, "Scoring Classifiers": {"type": "GROUP", "summary": "The model outputs a score, allowing thresholds to be swept.", "children": ["Graphical Measures", "Summary Statistics"]}, "Graphical Measures": {"type": "GROUP", "summary": "Curves preserve threshold-dependent behaviour instead of compressing everything to one scalar.", "children": ["ROC Curve", "PR Curve", "DET Curve", "Lift Curve", "Cost Curve"]}, "Summary Statistics": {"type": "GROUP", "summary": "One-number summaries of score/ranking performance.", "children": ["AUC", "H-measure"]}, "Continuous / Probabilistic Classifiers": {"type": "GROUP", "summary": "Metrics evaluating predicted probabilities or continuous outputs rather than only final labels.", "why": "Two models can have identical accuracy but very different confidence quality and calibration.", "children": ["RMSE / Brier Score", "Log-loss / Cross-entropy", "Calibration / Reliability", "KL Divergence", "Information Score"]}, "Alternate Information": {"type": "GROUP", "summary": "Evaluation criteria outside ordinary predictive performance.", "children": ["Interestingness", "Comprehensibility", "Multi-criteria / Efficiency"]}}, "metrics": {"Accuracy": ["Overall proportion correct.", "\\frac{TP+TN}{TP+TN+FP+FN}", ["TP", "TN"], ["TP", "TN", "FP", "FN"], "Balanced classes, similar FP/FN consequences, fixed hard-decision objective.", "Can hide poor per-class, subgroup, threshold, and probability performance.", ["Balanced diagnosis with equal error consequences", "Image classification with roughly equal classes"], "99% accuracy from always predicting the majority class on a 99:1 dataset.", "Balanced accuracy, per-class recall, ROC/PR, calibration."], "Error Rate": ["Overall proportion wrong.", "\\frac{FP+FN}{TP+TN+FP+FN}", ["FP", "FN"], ["TP", "TN", "FP", "FN"], "Same use case as accuracy when mistakes are the natural focus.", "Same weaknesses as accuracy.", ["Manufacturing defect decisions with equal costs"], "A rare critical class can be ignored while error rate remains low.", "Accuracy; it is exactly 1−accuracy."], "Precision / PPV": ["Among predicted positives, how many are truly positive?", "\\frac{TP}{TP+FP}", ["TP"], ["TP", "FP"], "False positives are expensive or review capacity is limited.", "Can look excellent while missing most positives.", ["Fraud alerts sent to analysts", "Spam filter where legitimate email must not be blocked"], "Predict only one obvious positive: precision may be 100% but recall tiny.", "Recall asks coverage; precision asks alert trustworthiness."], "Recall / Sensitivity / TPR": ["Among all real positives, how many were found?", "\\frac{TP}{TP+FN}", ["TP"], ["TP", "FN"], "False negatives are costly.", "Can be made high by predicting almost everything positive, creating many false alarms.", ["Cancer screening", "Security intrusion detection"], "Flag everyone: recall=1 but precision and specificity can be terrible.", "Precision and specificity describe the consequences of aggressive detection."], "Specificity / TNR": ["Among real negatives, how many were correctly rejected?", "\\frac{TN}{TN+FP}", ["TN"], ["TN", "FP"], "False positives must be controlled.", "Does not reveal how many positives are found or how trustworthy positive alerts are.", ["Confirmatory medical testing", "Spam protection for legitimate mail"], "Always predict negative: specificity=1 but recall=0.", "Recall is the positive-class counterpart; FPR=1−specificity."], "Fallout / FPR": ["Among negatives, how many caused false alarms?", "\\frac{FP}{FP+TN}", ["FP"], ["FP", "TN"], "Operational false-alarm burden per negative case matters.", "With enormous numbers of negatives, a small FPR can still produce many false alerts.", ["Biometric verification", "Network intrusion alerts"], "FPR=0.1% may still mean thousands of daily alerts.", "Precision additionally includes TP and directly measures alert trustworthiness."], "F1 / F-beta": ["Harmonic mean of precision and recall: high only when both are high. The harmonic mean is intentionally pulled toward the smaller component.", "F_1=\\dfrac{2PR}{P+R}=\\dfrac{2TP}{2TP+FP+FN},\\quad F_\\beta=\\dfrac{(1+\\beta^2)PR}{\\beta^2P+R}", ["TP"], ["TP", "FP", "FN"], "Positive-class retrieval when one number must combine alert trustworthiness and coverage; beta greater than 1 emphasizes recall and beta below 1 emphasizes precision.", "Ignores TN and does not directly encode arbitrary FP/FN costs.", ["P=1 and R=0.1 gives arithmetic mean 0.55 but F1 about 0.182, exposing the weak recall.", "F2 emphasizes recall; F0.5 emphasizes precision."], "A model can have strong F1 while performing poorly on the negative class.", "F1 uses β=1; F2 emphasizes recall; F0.5 emphasizes precision."], "G-mean": ["Geometric mean of sensitivity and specificity. Multiplication makes the score collapse when either class recall is poor.", "\\sqrt{Sensitivity\\cdot Specificity}=\\sqrt{TPR\\cdot TNR}", ["TP", "TN"], ["TP", "TN", "FP", "FN"], "Both classes should be recognized well and imbalance should not let one class dominate.", "Does not directly represent probability quality or explicit costs.", ["TPR=1 and TNR=0.1 gives G about 0.316, while their arithmetic mean is 0.55."], "A high score requires both class recalls to be high.", "Balanced accuracy uses an arithmetic mean; G-mean penalizes imbalance more strongly."], "Dice": ["Set-overlap measure. In binary classification it is exactly F1.", "\\dfrac{2|A\\cap B|}{|A|+|B|}=\\dfrac{2TP}{(TP+FP)+(TP+FN)}=\\dfrac{2TP}{2TP+FP+FN}", ["TP"], ["TP", "FP", "FN"], "Spatial overlap or positive-set similarity matters.", "Ignores TN, so it is unsuitable when correct negatives matter strongly.", ["True mask size 100, predicted mask size 120, overlap 80: Dice=160/220 about 0.727."], "80 overlapping pixels, 40 FP, 20 FN gives Dice=160/220≈0.727.", "Equivalent to binary F1 after replacing the set sizes with TP, FP and FN."], "Cohen's Kappa": ["Observed agreement corrected for agreement expected from label marginals.", "\\kappa=\\frac{p_o-p_e}{1-p_e}", ["TP", "TN", "FP", "FN"], ["TP", "TN", "FP", "FN"], "Agreement may be inflated by class prevalence or chance.", "Can behave counter-intuitively under extreme prevalence; the chance model must be understood.", ["Two annotators", "Classifier compared with an imperfect categorical reference"], "90% raw agreement can become moderate κ when expected chance agreement is 80%.", "Accuracy is raw agreement; kappa is chance-corrected."], "Fleiss' Kappa": ["Chance-corrected agreement for multiple raters.", "\\kappa=\\frac{\\bar P-\\bar P_e}{1-\\bar P_e}", [], [], "Several raters label each item.", "Assumptions about rater sampling and marginals may not match fixed-expert settings.", ["Medical panels", "Annotation quality audits"], "Majority vote can hide systematic expert disagreement.", "Cohen's kappa is primarily for two raters."], "ROC Curve": ["TPR versus FPR as the threshold changes.", "TPR(t)\\;\\text{vs}\\;FPR(t)", [], [], "Ranking behaviour and threshold trade-offs are central.", "Can look optimistic under rare positives; does not directly show precision or deployment costs.", ["Diagnostic score thresholding", "Biometric verification"], "Two ROC curves may cross, so one model is not always better.", "PR focuses on positive alerts; cost curves attach operational cost."], "PR Curve": ["Precision versus recall as the threshold changes.", "Precision(t)\\;\\text{vs}\\;Recall(t)", [], [], "Positives are rare and false alerts dominate practical workload.", "Depends on prevalence, so curves across datasets with different prevalence are not directly comparable.", ["Fraud detection", "Search and retrieval"], "A tiny FPR may coexist with terrible precision when negatives are huge.", "ROC uses class-conditional rates; PR shows retrieved-set quality."], "DET Curve": ["False-negative rate versus false-positive rate, often on probit axes.", "FNR(t)\\;\\text{vs}\\;FPR(t)", [], [], "Both error types and low-error operating regions matter.", "On ordinary linear axes it is largely a reflected ROC; its value comes from error-error interpretation and transformed axes.", ["Speaker verification", "Biometrics"], "Ideal point is (0,0): no misses and no false alarms.", "ROC plots success versus error; DET plots error versus error."], "Lift Curve": ["Enrichment of positives in the top-ranked fraction compared with random selection.", "Lift(q)=\\frac{Precision@q}{Prevalence}", [], [], "Only the top-ranked cases can be acted on.", "Does not summarize the whole ranking uniformly and depends on prevalence.", ["Top 1% fraud review", "Marketing response targeting"], "Lift 10 means the selected group is ten times richer in positives than random.", "PR also evaluates retrieval quality; lift emphasizes operational top-k selection."], "Cost Curve": ["Expected normalized cost over varying prevalence/cost conditions.", "EC=P(+)C_{FN}FNR+P(-)C_{FP}FPR", [], [], "FP/FN costs or prevalence vary and threshold selection should reflect them.", "Requires credible cost/prevalence assumptions.", ["Medical triage", "Credit approval"], "Crossing cost lines show where the preferred threshold or classifier changes.", "ROC shows trade-offs; cost curves translate them into loss."], "AUC": ["Probability that a random positive is ranked above a random negative.", "P(s(X^+)>s(X^-))", [], [], "Global ranking quality is needed without selecting one threshold.", "Can hide crossing ROC curves, local operating performance, probability calibration, and application costs.", ["Model screening", "Ranking evaluation"], "A majority predictor can have 99% accuracy but AUC≈0.5.", "H-measure introduces a common cost distribution."], "H-measure": ["Cost-coherent scalar alternative to AUC.", "1-\\frac{L}{L_{ref}}", [], [], "A classifier-independent distribution over relative costs can be specified.", "Less familiar and requires choosing a cost distribution.", ["Cost-uncertain classification comparisons"], "All models are judged under the same application-level cost distribution.", "AUC is easier and ranking-oriented; H is explicitly cost-contextual."], "RMSE / Brier Score": ["Squared distance between predicted probabilities and outcomes.", "BS=\\frac1n\\sum_i(p_i-y_i)^2", [], [], "Probability accuracy and calibration matter.", "Mixes calibration and refinement; RMSE is just sqrt(Brier) and is less commonly reported.", ["Weather-like risk prediction", "Clinical risk models"], "0.9 for a negative incurs 0.81 squared error.", "Log-loss punishes confident errors more strongly."], "Log-loss / Cross-entropy": ["Average negative log-probability assigned to the true class.", "-\\frac1n\\sum_i[y_i\\log p_i+(1-y_i)\\log(1-p_i)]", [], [], "Honest probabilistic predictions matter and confident errors should be strongly penalized.", "Can be dominated by a few extreme, confidently wrong predictions.", ["Probabilistic classifiers", "Risk estimation"], "Predicting 0.001 for a true positive receives a huge penalty.", "Brier score is gentler and quadratic."], "Calibration / Reliability": ["Whether predicted probabilities match empirical event frequencies.", "P(Y=1\\mid \\hat p=p)\\approx p", [], [], "Probabilities are used as risks or decisions depend on expected frequencies.", "Perfect calibration alone does not imply good discrimination.", ["Medical risk scores", "Credit default probabilities"], "Among predictions near 0.7, roughly 70% should be positive.", "Log-loss/Brier combine calibration with other aspects."], "KL Divergence": ["Information loss from approximating a target distribution with a predicted distribution.", "D_{KL}(P\\\\|Q)=\\sum_y P(y)\\log\\frac{P(y)}{Q(y)}", [], [], "Full distributions are compared.", "Asymmetric and infinite if Q assigns zero probability where P is positive.", ["Distributional prediction", "Knowledge distillation"], "Measures extra coding cost from using Q instead of P.", "Cross-entropy H(P,Q)=H(P)+KL(P||Q)."], "Information Score": ["Information supplied by the posterior compared with the prior.", "\\log\\frac{P(y\\mid output)}{P(y)}", [], [], "You want to know whether the classifier adds evidence beyond base prevalence.", "Requires careful interpretation of priors and probabilistic outputs.", ["Rare-class prediction", "Information-theoretic classifier evaluation"], "Moving the true class from prior 0.1 to posterior 0.8 gives positive information.", "Log-loss scores the posterior itself; information score emphasizes improvement over prior."], "Interestingness": ["Usefulness, novelty, or surprisingness of discovered patterns.", "application-specific", [], [], "Rule learning or subgroup discovery needs more than predictive correctness.", "Subjective and domain-dependent.", ["Discovering unusual patient subgroups"], "A highly accurate but trivial rule may be uninteresting.", "Pair with predictive validity."], "Comprehensibility": ["How understandable the model or rule is to humans.", "application-specific", [], [], "Auditability, explanation, or human decision support matters.", "Difficult to quantify consistently.", ["Clinical decision rules", "Regulated models"], "A slightly less accurate transparent model may be preferable.", "Use as a separate criterion, not a replacement for predictive evaluation."], "Multi-criteria / Efficiency": ["Joint evaluation of predictive quality, cost, latency, memory, interpretability and other objectives.", "Pareto\\;or\\;weighted\\;utility", [], [], "No single metric represents deployment success.", "Results depend on chosen criteria and weights.", ["Edge deployment", "Real-time fraud screening"], "Compare Pareto-efficient models rather than inventing one arbitrary score.", "Use constraints and Pareto fronts when weights are uncertain."], "Balanced Accuracy": ["Average of the positive-class and negative-class recalls.", "\\dfrac12\\left(\\dfrac{TP}{TP+FN}+\\dfrac{TN}{TN+FP}\\right)", ["TP", "TN"], ["TP", "TN", "FP", "FN"], "Imbalanced classes when both classes should contribute equally.", "It assumes equal class importance, not arbitrary error costs.", ["TPR=0.9 and TNR=0.5 gives balanced accuracy 0.7."], "A classifier perfect on one class and useless on the other still gets 0.5.", "Arithmetic mean of sensitivity and specificity; G-mean uses the geometric mean and penalizes imbalance more strongly."], "WRAcc": ["Weighted relative accuracy asks whether a subgroup contains more positives than expected from the population base rate, while also rewarding subgroup coverage.", "\\dfrac{4c}{(1+c)^2}(TPR-FPR)", ["TP", "FP"], ["TP", "TN", "FP", "FN"], "Subgroup discovery and ROC geometry.", "Its numeric scale depends on skew c; the strongly skew-insensitive core is TPR-FPR.", ["A useful subgroup is both unusual and large enough to matter."], "A tiny pure subgroup may have high precision but low WRAcc because it covers almost nobody.", "Its isometrics are parallel to TPR-FPR=constant and have effective slope 1."], "Fowlkes–Mallows": ["Geometric mean of precision and recall.", "\\sqrt{Precision\\cdot Recall}", ["TP"], ["TP", "FP", "FN"], "Multiplicative balance of precision and recall.", "Still ignores TN and is less common than F1 in classification.", ["P=0.8 and R=0.5 gives about 0.632."], "Do not confuse it with the common class-balanced G-mean sqrt(TPR*TNR).", "F1 uses the harmonic mean; Fowlkes–Mallows uses the geometric mean."], "Likelihood Ratios": ["Evidence ratios used to update odds after a test result.", "LR^+=\\dfrac{TPR}{FPR},\\quad LR^-=\\dfrac{FNR}{TNR}", ["TP", "TN", "FP", "FN"], ["TP", "TN", "FP", "FN"], "Diagnostic evidence and Bayesian updating.", "Not a single overall score.", ["LR+=10 means a positive result is ten times as likely for a true positive as for a true negative."], "Strong LR+ does not guarantee high precision when prevalence is tiny.", "Unlike precision, likelihood ratios are class-conditional and prevalence-independent."]}};
function render(name,depth=0){const g=DATA.nodes[name],m=!!DATA.metrics[name];if(m)return `<button class="node leaf" data-name="${name}">${name}</button>`;const ch=(g&&g.children)||[];return `<details open><summary><button class="node group" data-name="${name}">${name}</button></summary>${ch.map(x=>render(x,depth+1)).join('')}</details>`}
tree.innerHTML=render('All measures');
function cmHtml(num,den){function cls(v){const n=num.includes(v),d=den.includes(v);return n&&d?'both':n?'num':d?'den':''}return `<table class="cm"><tr><th>Predicted \\ True</th><th>Positive</th><th>Negative</th></tr><tr><th>Positive</th><td class="${cls('TP')}">TP</td><td class="${cls('FP')}">FP</td></tr><tr><th>Negative</th><td class="${cls('FN')}">FN</td><td class="${cls('TN')}">TN</td></tr></table><div class="small">Blue = numerator; orange = denominator; purple = both.</div>`}
function show(name){document.querySelectorAll('.node').forEach(n=>n.classList.toggle('active',n.dataset.name===name));const m=DATA.metrics[name],g=DATA.nodes[name]||{};if(m){const [intuition,eq,num,den,shine,weak,examples,bad,compare]=m;info.innerHTML=`<div class="small">METRIC</div><h2>${name}</h2><div class="section"><h3>Intuition</h3>${intuition}</div><div class="section"><h3>Equation</h3><div style="font-size:21px">\\(${eq}\\)</div></div><div class="section"><h3>When it shines</h3>${shine}</div><div class="section"><h3>When it is weak or misleading</h3>${weak}</div><div class="section"><h3>Examples</h3><ul>${examples.map(x=>`<li>${x}</li>`).join('')}</ul><b>Failure example:</b> ${bad}</div><div class="section"><h3>Compare with</h3>${compare}</div>${SUPP[name]||''}${num.length||den.length?`<div class="section"><h3>Confusion-matrix components</h3>${cmHtml(num,den)}</div>`:''}`}else{info.innerHTML=`<div class="small">${g.type||'GROUP'}</div><h2>${name}</h2><div class="section"><h3>What this branch means</h3>${g.summary||''}</div><div class="section"><h3>Why it matters</h3>${g.why||'Different branches use different information and answer different evaluation questions.'}</div><div class="section"><h3>Contained topics</h3>${(g.children||[]).map(x=>`<button class="node ${DATA.metrics[x]?'leaf':'group'}" data-name="${x}">${x}</button>`).join('')}</div>`;info.querySelectorAll('.node').forEach(b=>b.addEventListener('click',()=>show(b.dataset.name)))}if(window.MathJax)MathJax.typesetPromise()}
document.querySelectorAll('#tree .node').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();show(b.dataset.name)}));show('All measures');
</script></body></html>
