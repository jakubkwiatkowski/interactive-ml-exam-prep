<!doctype html><html><head><meta charset='utf-8'><title>Performance Measures Hierarchy Explorer v2</title>
<script>window.MathJax={tex:{inlineMath:[['\\(','\\)'],['$','$']]}};</script><script defer src='https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js'></script>
<style>body{font-family:Arial;margin:0;background:#f6f7fb;color:#222}header{background:#1f2937;color:white;padding:18px 24px}.layout{display:grid;grid-template-columns:minmax(760px,1.4fr) minmax(420px,1fr);gap:16px;padding:16px}.card{background:white;border-radius:12px;padding:14px;box-shadow:0 1px 6px #0002}.canvas{position:relative;height:790px;overflow:auto;background:#fafafa;border:1px solid #e5e7eb;border-radius:10px}.node{position:absolute;transform:translate(-50%,-50%);padding:7px 10px;border-radius:8px;border:1px solid #64748b;background:#e0f2fe;cursor:pointer;text-align:center;min-width:110px;font-size:13px;z-index:2}.node.leaf{background:#ecfccb}.node.active{outline:4px solid #6366f1}.line{position:absolute;height:2px;background:#94a3b8;transform-origin:0 0;z-index:1}.info h2{margin-top:0}.tag{display:inline-block;background:#eef2f7;padding:3px 8px;border-radius:999px;font-size:12px;margin-right:4px}.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin:10px 0}.cm{border-collapse:collapse;width:100%}.cm th,.cm td{border:1px solid #bbb;padding:8px;text-align:center}.cm th{background:#eef2f7}.num{background:#bfdbfe}.den{outline:4px solid #f59e0b;outline-offset:-4px}.both{background:#c4b5fd;outline:4px solid #f59e0b;outline-offset:-4px}.eq{font-size:20px;text-align:center}.small{font-size:13px;color:#555;line-height:1.4}@media(max-width:1200px){.layout{grid-template-columns:1fr}}</style></head>
<body><header><h2 style='margin:0'>Interactive Hierarchy of Performance Measures — Expanded</h2><div class='small' style='color:#d1d5db'>Click any group or metric. The right panel explains purpose, strengths, weaknesses, comparisons, equation, and confusion-matrix use.</div></header>
<div class='layout'><section class='card'><div class='canvas' id='canvas'></div></section><section class='card info' id='info'></section></div>
<script>
const nodes=[
{id:'all',x:50,y:5,name:'All measures',kind:'group',desc:'All evaluation measures answer different questions. First ask what the classifier outputs and what information the application provides.'},
{id:'cm',p:'all',x:18,y:18,name:'Confusion Matrix',kind:'group',desc:'Metrics based on TP, FP, FN, TN after fixing a threshold. Good for decision quality at one operating point; they discard score ranking and probability calibration.'},
{id:'add',p:'all',x:50,y:18,name:'Additional Information',kind:'group',desc:'Uses scores, probabilities, uncertainty, class skew, or costs. Choose this branch when hard labels alone are not enough.'},
{id:'alt',p:'all',x:82,y:18,name:'Alternate Information',kind:'group',desc:'Uses criteria such as interestingness, interpretability, comprehensibility, or multiple objectives.'},
{id:'det',p:'cm',x:18,y:30,name:'Deterministic classifiers',kind:'group',desc:'The classifier outputs a label, or a score has already been thresholded.'},
{id:'multi',p:'det',x:8,y:42,name:'Global / multi-class focus',kind:'group',desc:'Summarizes correctness across all classes. Easy to communicate but can hide minority-class and per-class failures.'},
{id:'single',p:'det',x:28,y:42,name:'Single-class focus',kind:'group',desc:'Choose one class as positive and examine its errors. For multiclass tasks, compute one-vs-rest metrics then macro, weighted, or micro averages.'},
{id:'acc',p:'multi',x:4,y:56,name:'Accuracy',kind:'leaf',eq:'\\dfrac{TP+TN}{TP+TN+FP+FN}',num:['TP','TN'],den:['TP','TN','FP','FN'],good:'Balanced classes, equal error costs, and a fixed deployment threshold.',bad:'Severe imbalance, unequal costs, ranking or probability-quality questions.',example:'A 50/50 cat-dog task with equally serious errors.',compare:'Balanced accuracy when prevalence is uneven; cost when errors have different consequences.'},
{id:'kap',p:'multi',x:12,y:56,name:"Cohen's kappa",kind:'leaf',eq:'\\dfrac{p_o-p_e}{1-p_e}',num:['TP','TN','FP','FN'],den:['TP','TN','FP','FN'],good:'Agreement where chance agreement from marginal label frequencies matters.',bad:'When kappa’s marginal assumptions are not meaningful, or when a direct cost/error measure is needed.',example:'Classifier agreement with an expert label set under imbalance.',compare:'Accuracy is raw agreement; kappa is chance-corrected agreement.'},
{id:'prec',p:'single',x:20,y:56,name:'Precision / PPV',kind:'leaf',eq:'\\dfrac{TP}{TP+FP}',num:['TP'],den:['TP','FP'],good:'False positives are costly; positive predictions must be trustworthy.',bad:'When missed positives dominate and recall matters more.',example:'Manual fraud investigations with limited analyst capacity.',compare:'Recall asks how many positives you found; precision asks how many alerts were correct.'},
{id:'rec',p:'single',x:28,y:56,name:'Recall / sensitivity',kind:'leaf',eq:'\\dfrac{TP}{TP+FN}',num:['TP'],den:['TP','FN'],good:'False negatives are costly.',bad:'When false alarms are very costly and precision is essential.',example:'Medical screening where missing disease is dangerous.',compare:'Specificity is the corresponding negative-class recall.'},
{id:'f1',p:'single',x:36,y:56,name:'F1 / Dice',kind:'leaf',eq:'\\dfrac{2TP}{2TP+FP+FN}=\\dfrac{2PR}{P+R}',num:['TP'],den:['TP','FP','FN'],good:'Need one positive-class score balancing precision and recall.',bad:'True negatives matter, costs are asymmetric, or probability quality matters.',example:'Information retrieval where TN is enormous and uninformative.',compare:'Fβ changes the precision-recall weighting; Dice is algebraically the same for binary sets.'},
{id:'score',p:'add',x:43,y:31,name:'Scoring classifiers',kind:'group',desc:'A score orders examples. Threshold variation creates ROC, PR, DET, lift, and cost curves.'},
{id:'prob',p:'add',x:61,y:31,name:'Probabilistic classifiers',kind:'group',desc:'Predicted numbers should mean probabilities. Evaluate calibration and probability error, not only ranking.'},
{id:'graph',p:'score',x:39,y:44,name:'Graphical measures',kind:'group',desc:'Show trade-offs rather than hiding them in one number.'},
{id:'sum',p:'score',x:49,y:44,name:'Summary statistics',kind:'group',desc:'Compress a curve or ranking into one scalar. Convenient, but can hide where curves cross.'},
{id:'roc',p:'graph',x:34,y:58,name:'ROC curve',kind:'leaf',good:'Compare ranking across thresholds and inspect TPR/FPR trade-offs.',bad:'Very rare positives where actual alert precision matters most.',example:'Medical score evaluated over all thresholds.',compare:'PR incorporates prevalence through precision.'},
{id:'pr',p:'graph',x:41,y:58,name:'PR curve',kind:'leaf',good:'Positive class is rare and false-positive workload matters.',bad:'Need symmetric treatment of both classes or cost geometry.',example:'Fraud detection with 0.1% fraud.',compare:'Unlike ROC, the no-skill baseline equals prevalence, not a universal diagonal.'},
{id:'cost',p:'graph',x:48,y:58,name:'Cost curve',kind:'leaf',good:'Class prevalence or error costs vary and you want to see which classifier wins where.',bad:'Costs and deployment conditions are completely irrelevant.',example:'Choosing fraud thresholds as review cost changes.',compare:'ROC shows error trade-off; cost curve directly shows expected cost.'},
{id:'auc',p:'sum',x:52,y:58,name:'AUC',kind:'leaf',good:'Need a prevalence-invariant ranking summary.',bad:'Only a narrow FPR range matters, curves cross, or cost coherence is essential.',example:'Screening model ranking positives above negatives.',compare:'H-measure uses a fixed cost distribution; partial AUC focuses on a relevant region.'},
{id:'h',p:'sum',x:58,y:58,name:'H-measure',kind:'leaf',good:'Want AUC-like aggregation but with a classifier-independent cost distribution.',bad:'No meaningful cost distribution can be specified.',example:'Compare credit-risk models under uncertain but application-defined costs.',compare:'Designed to address a cost-coherence criticism of AUC.'},
{id:'dist',p:'prob',x:58,y:44,name:'Distance / error',kind:'group',desc:'Treat probability predictions as numeric values and penalize their distance from outcomes.'},
{id:'infoT',p:'prob',x:68,y:44,name:'Information-theoretic',kind:'group',desc:'Evaluate surprise, uncertainty reduction, or divergence between predicted and true distributions.'},
{id:'brier',p:'dist',x:57,y:58,name:'Brier / probability MSE',kind:'leaf',eq:'\\dfrac1n\\sum_i(p_i-y_i)^2',good:'Need a proper score with intuitive squared probability error.',bad:'Only ranking matters or extreme confidence errors deserve stronger penalties.',example:'Weather probabilities: predictions of 0.7 should occur about 70% of the time.',compare:'Log-loss punishes confident mistakes much more strongly.'},
{id:'log',p:'infoT',x:66,y:58,name:'Log-loss / cross-entropy',kind:'leaf',eq:'-\\dfrac1n\\sum_i[y_i\\log p_i+(1-y_i)\\log(1-p_i)]',good:'Need a proper probabilistic score that strongly punishes confident errors.',bad:'Probabilities contain exact zeros/ones without clipping, or interpretability in probability units matters.',example:'A true positive predicted as 0.001 receives a huge penalty.',compare:'Brier is quadratic and gentler; KL divergence is closely related.'},
{id:'is',p:'infoT',x:73,y:58,name:'Information score',kind:'leaf',good:'Want to quantify information added beyond the prior class probability.',bad:'Only hard decisions matter or prior probabilities are unreliable.',example:'Prior disease risk 10%; posterior 80% for a true case gives positive information.',compare:'Log-loss evaluates posterior probability itself; information score emphasizes improvement from prior to posterior.'},
{id:'interest',p:'alt',x:77,y:36,name:'Interestingness',kind:'leaf',good:'Rule/subgroup discovery where novelty or unusualness matters.',bad:'Pure predictive deployment where only error matters.',example:'Finding an unusual patient subgroup.'},
{id:'comp',p:'alt',x:84,y:48,name:'Comprehensibility',kind:'leaf',good:'Human understanding, auditing, or scientific interpretation matters.',bad:'Only predictive performance matters and model complexity is unconstrained.',example:'A short decision rule preferred to a black-box ensemble.'},
{id:'mc',p:'alt',x:91,y:60,name:'Multi-criteria',kind:'leaf',good:'Accuracy, latency, cost, fairness, interpretability, and memory must be traded off.',bad:'One application utility is already exactly known as a scalar.',example:'Edge deployment balancing accuracy, energy, and latency.'}
];
function line(a,b){const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;const el=document.createElement('div');el.className='line';el.style.left=a.x+'%';el.style.top=a.y+'%';el.style.width=len+'%';el.style.transform=`rotate(${ang}deg)`;canvas.appendChild(el)}
function cm(n){if(!n.num)return '';const cl=x=>n.num.includes(x)&&n.den.includes(x)?'both':n.num.includes(x)?'num':n.den.includes(x)?'den':'';return `<div class='box'><b>Confusion-matrix components</b><table class='cm'><tr><th>Predicted \\ True</th><th>Positive</th><th>Negative</th></tr><tr><th>Positive</th><td class='${cl('TP')}'>TP</td><td class='${cl('FP')}'>FP</td></tr><tr><th>Negative</th><td class='${cl('FN')}'>FN</td><td class='${cl('TN')}'>TN</td></tr></table><div class='small'>Blue = numerator; orange outline = denominator; purple = both.</div></div>`}
function show(n){document.querySelectorAll('.node').forEach(x=>x.classList.remove('active'));document.getElementById('n-'+n.id).classList.add('active');info.innerHTML=`<div class='small'>${n.kind==='leaf'?'METRIC':'CATEGORY'}</div><h2>${n.name}</h2>${n.desc?`<div class='box'>${n.desc}</div>`:''}${n.eq?`<div class='box eq'>\\(${n.eq}\\)</div>`:''}${n.good?`<div class='box'><b>When it shines</b><br>${n.good}</div><div class='box'><b>When it is weak / misleading</b><br>${n.bad}</div><div class='box'><b>Example</b><br>${n.example}</div><div class='box'><b>Compare with</b><br>${n.compare}</div>`:''}${cm(n)}`;if(window.MathJax)MathJax.typesetPromise()}
nodes.forEach(n=>{if(n.p)line(nodes.find(x=>x.id===n.p),n)});nodes.forEach(n=>{const e=document.createElement('button');e.className='node '+(n.kind==='leaf'?'leaf':'');e.id='n-'+n.id;e.style.left=n.x+'%';e.style.top=n.y+'%';e.textContent=n.name;e.onclick=()=>show(n);canvas.appendChild(e)});show(nodes[0]);
</script></body></html>
