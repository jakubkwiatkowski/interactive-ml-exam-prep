<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Compare ROC Isometrics Across Skew Values</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><script>window.MathJax={tex:{inlineMath:[['\\(','\\)'],['$','$']]}};</script><script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script><style>body{font-family:Arial,sans-serif;margin:0;background:#f6f7f9;color:#222}header{background:#1f2937;color:#fff;padding:18px 24px}main{display:grid;grid-template-columns:340px 1fr;gap:16px;padding:16px}.panel{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 6px #0002}label{display:block;margin-top:12px;font-weight:700}select,input{width:100%;box-sizing:border-box}#plot{height:720px}.eq{background:#eef2f7;border-radius:8px;padding:10px;margin-top:12px;line-height:1.5}.small{font-size:13px;color:#555;line-height:1.4}.value{font-family:monospace;background:#eee;padding:2px 5px;border-radius:4px}button{margin-top:14px;width:100%;padding:9px;font-weight:700}</style></head><body><header><h2>Compare 2D ROC Isometrics for Multiple \(c\) Values</h2><div class="small" style="color:#d1d5db">Choose one metric value and several skew ratios. Each colored line is the equal-metric contour for one \(c\).</div></header><main><section class="panel"><label>Metric</label><select id="metric"><option value="accuracy">Accuracy</option><option value="precision">Precision</option><option value="f1">F1</option><option value="balanced_accuracy">Balanced accuracy</option><option value="youden">Youden J</option><option value="wracc">WRAcc</option><option value="recall">Recall / TPR</option></select><label>Fixed metric value \(m\): <span id="mVal" class="value"></span></label><input id="m" type="range" min="0.05" max="0.95" step="0.01" value="0.80"><label>Skew values \(c\), comma-separated</label><input id="cs" type="text" value="0.5, 0.9, 1, 2, 5"><button id="draw">Draw comparison</button><div id="formula" class="eq"></div><p class="small">\(c=NEG/POS\). The classifier point coordinates remain \(FPR,TPR\); changing \(c\) changes the metric's equal-value contour.</p></section><section class="panel"><div id="plot"></div></section></main><script>
const FPRS=Array.from({length:201},(_,i)=>i/200);function solveTPR(metric,m,fpr,c){if(metric==='accuracy')return m*(1+c)-c*(1-fpr);if(metric==='precision')return m>=.999?NaN:(m*c*fpr)/(1-m);if(metric==='f1')return m*(c*fpr+1)/(2-m);if(metric==='balanced_accuracy')return 2*m-1+fpr;if(metric==='youden')return m+fpr;if(metric==='wracc')return fpr+m*(1+c)*(1+c)/(4*c);if(metric==='recall')return m}function formula(metric){return({accuracy:'\\(Accuracy=\\dfrac{TPR+c(1-FPR)}{1+c}\\)',precision:'\\(Precision=\\dfrac{TPR}{TPR+cFPR}\\)',f1:'\\(F_1=\\dfrac{2TPR}{TPR+cFPR+1}\\)',balanced_accuracy:'\\(BA=\\dfrac{TPR+1-FPR}{2}\\)',youden:'\\(J=TPR-FPR\\)',wracc:'\\(WRAcc=\\dfrac{4c}{(1+c)^2}(TPR-FPR)\\)',recall:'\\(Recall=TPR\\)'})[metric]}
function draw(){const metric=document.getElementById('metric').value,m=parseFloat(document.getElementById('m').value);mVal.textContent=m.toFixed(2);document.getElementById('formula').innerHTML=formula(metric);if(window.MathJax)MathJax.typesetPromise();const cs=document.getElementById('cs').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>Number.isFinite(x)&&x>0);const traces=cs.map(c=>{const xs=[],ys=[];for(const fpr of FPRS){const tpr=solveTPR(metric,m,fpr,c);if(tpr>=0&&tpr<=1){xs.push(fpr);ys.push(tpr)}}return{type:'scatter',mode:'lines',x:xs,y:ys,name:`c=${c}`}});traces.push({type:'scatter',mode:'lines',x:[0,1],y:[0,1],line:{dash:'dash'},name:'random diagonal'});Plotly.react('plot',traces,{margin:{l:60,r:20,b:55,t:20},xaxis:{title:'FPR',range:[0,1]},yaxis:{title:'TPR',range:[0,1]},legend:{orientation:'h'}},{responsive:true})}
document.getElementById('draw').addEventListener('click',draw);document.getElementById('metric').addEventListener('change',draw);document.getElementById('m').addEventListener('input',draw);draw();
</script></body></html>
